  (function dust(){
    const N=420, pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      pos[i*3]  =(Math.random()-0.5)*16;
      pos[i*3+1]=(Math.random()-0.5)*10;
      pos[i*3+2]=(Math.random()-0.5)*8 - 1;
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const m=new THREE.PointsMaterial({color:0x9fb0c2, size:0.018, transparent:true, opacity:0.5, depthWrite:false, blending:THREE.AdditiveBlending});
    const pts=new THREE.Points(g,m); scene.add(pts); window.__dust=pts;
  })();

  // ---- interaction: auto-spin + drag with inertia ----
  let rotY=-0.5, velY=0, dragging=false, lastX=0, auto=0.0045, idle=0;
  const dom=renderer.domElement;
  function down(x){ dragging=true; lastX=x; idle=0; hideHint(); }
  function move(x){ if(!dragging) return; const dx=x-lastX; lastX=x; velY=dx*0.006; rotY+=dx*0.006; }
  function up(){ dragging=false; }
  dom.addEventListener('pointerdown', e=>down(e.clientX));
  addEventListener('pointermove', e=>move(e.clientX));
  addEventListener('pointerup', up);
  dom.addEventListener('touchstart', e=>down(e.touches[0].clientX), {passive:true});
  addEventListener('touchmove', e=>move(e.touches[0].clientX), {passive:true});
  addEventListener('touchend', up);

  const hintEl=document.getElementById('hint');
  setTimeout(()=>hintEl.classList.add('show'), 900);
  let hintHidden=false;
  function hideHint(){ if(!hintHidden){ hintHidden=true; hintEl.classList.remove('show'); } }
  setTimeout(hideHint, 6000);

  // ---- loop ----
  const clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const t=clock.getElapsedTime();
    if(!dragging){ rotY += auto + velY; velY*=0.94; }
    logo.rotation.y = rotY;
    logo.rotation.x = Math.sin(t*0.45)*0.11;          // gentle breathing tilt
    logo.position.y = Math.sin(t*0.6)*0.06;            // slow float
    goldRim.position.x = Math.cos(t*0.5)*4.4;          // gold sweep
    goldRim.position.z = Math.sin(t*0.5)*3.2 + 1.5;
    if(window.__dust) window.__dust.rotation.y = t*0.01;
    render();
  }
  function render(){ renderer.render(scene, camera); }
  animate();

  addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight); render();
  });
  </script>
</body>
</html>
