<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ALTACO · beyond the surface</title>
<style>
  :root{ --gold:#AF8B4F; --ink:#121A24; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:#000; overflow:hidden; }
  #stage{ position:fixed; inset:0;
    background:
      radial-gradient(120% 90% at 50% 42%, #0b1017 0%, #05080c 55%, #000 100%); }
  canvas{ display:block; }
  .overlay{ position:fixed; inset:0; pointer-events:none;
    font-family:"Manrope","Helvetica Neue",Arial,sans-serif; color:#cdd6e0; }
  .cap{ position:absolute; left:0; right:0; bottom:36px; text-align:center;
    font-size:11px; letter-spacing:.42em; text-transform:uppercase;
    color:#7c8794; font-weight:500; }
  .cap .g{ color:var(--gold); }
  .axes{ position:absolute; left:0; right:0; bottom:18px; text-align:center;
    font-size:9.5px; letter-spacing:.34em; text-transform:uppercase;
    color:#414b57; }
  .hint{ position:absolute; left:0; right:0; top:26px; text-align:center;
    font-size:10px; letter-spacing:.3em; text-transform:uppercase;
    color:#586472; opacity:0; transition:opacity 1.1s ease; }
  .hint.show{ opacity:.85; }
  .vig{ position:fixed; inset:0; pointer-events:none;
    box-shadow:inset 0 0 220px 60px rgba(0,0,0,.9); }
</style>
</head>
<body>
  <div id="stage"></div>
  <div class="vig"></div>
  <div class="overlay">
    <div class="hint" id="hint">потягніть, щоб обертати</div>
    <div class="cap">beyond&nbsp;the&nbsp;<span class="g">surface</span></div>
    <div class="axes">X&nbsp;·&nbsp;Y&nbsp;·&nbsp;Z&nbsp;·&nbsp;світло&nbsp;·&nbsp;час</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  const LOGO = "./altaco.png";
  const RATIO = 3.98444;
  const GOLD = 0xAF8B4F;

  const stage = document.getElementById('stage');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(34, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0, 0.15, 7.0);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  stage.appendChild(renderer.domElement);

  // ---- lighting: cool base, warm key, gold rim ----
  scene.add(new THREE.AmbientLight(0x24313f, 0.55));
  const key = new THREE.DirectionalLight(0xfff3e0, 1.15);
  key.position.set(3.2, 4.0, 6.0); scene.add(key);
  const goldRim = new THREE.PointLight(GOLD, 1.7, 26); goldRim.position.set(-4.2, 1.4, 3.2); scene.add(goldRim);
  const coolFill = new THREE.PointLight(0x3d5f8c, 0.7, 26); coolFill.position.set(5.0, -2.2, 3.8); scene.add(coolFill);
  const backRim = new THREE.PointLight(0xffffff, 0.85, 24); backRim.position.set(0, 1.6, -5.5); scene.add(backRim);

  // ---- rounded-rect extruded stone plaque ----
  function roundedRect(w, h, r){
    const s = new THREE.Shape();
    const x=-w/2, y=-h/2;
    s.moveTo(x+r, y);
    s.lineTo(x+w-r, y); s.quadraticCurveTo(x+w, y, x+w, y+r);
    s.lineTo(x+w, y+h-r); s.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    s.lineTo(x+r, y+h); s.quadraticCurveTo(x, y+h, x, y+h-r);
    s.lineTo(x, y+r); s.quadraticCurveTo(x, y, x+r, y);
    return s;
  }
  const PW = 4.15, PH = PW/RATIO + 0.62;   // plaque a touch taller than the lockup
  const shape = roundedRect(PW, PH, 0.14);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth:0.30, bevelEnabled:true, bevelThickness:0.05, bevelSize:0.05, bevelSegments:4, steps:1
  });
  geo.center();
  geo.computeBoundingBox();
  const zFront = geo.boundingBox.max.z;

  const stone = new THREE.MeshStandardMaterial({
    color:0x0e151d, metalness:0.62, roughness:0.30
  });
  const plaque = new THREE.Mesh(geo, stone);

  // ---- engraved authentic lockup on both faces (one shared texture) ----
  const tex = new THREE.TextureLoader().load(LOGO, ()=>{ render(); });
  tex.encoding = THREE.sRGBEncoding;
  tex.anisotropy = 8;

  const faceMat = new THREE.MeshStandardMaterial({
    map:tex, emissive:0xfff4e2, emissiveMap:tex, emissiveIntensity:1.05,
    metalness:0.45, roughness:0.34, transparent:true, alphaTest:0.06, depthWrite:false
  });

  const lw = PW*0.80, lh = lw/RATIO;
  function facePlane(mirror){
    const g = new THREE.PlaneGeometry(lw, lh);
    if(mirror){ const uv=g.attributes.uv; for(let i=0;i<uv.count;i++) uv.setX(i, 1-uv.getX(i)); uv.needsUpdate=true; }
    return new THREE.Mesh(g, faceMat);
  }
  const faceF = facePlane(false); faceF.position.z = zFront + 0.006;
  const faceB = facePlane(true);  faceB.position.z = -(zFront + 0.006); faceB.rotation.y = Math.PI;

  const logo = new THREE.Group();
  logo.add(plaque); logo.add(faceF); logo.add(faceB);
  scene.add(logo);

  // ---- soft premium halo behind the plaque ----
  (function halo(){
    const c=document.createElement('canvas'); c.width=c.height=256;
    const g=c.getContext('2d');
    const rad=g.createRadialGradient(128,128,10,128,128,128);
    rad.addColorStop(0,'rgba(200,180,140,0.55)');
    rad.addColorStop(0.4,'rgba(120,120,150,0.14)');
    rad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=rad; g.fillRect(0,0,256,256);
    const ht=new THREE.CanvasTexture(c);
    const hm=new THREE.MeshBasicMaterial({map:ht, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.5});
    const hp=new THREE.Mesh(new THREE.PlaneGeometry(9,9), hm);
    hp.position.z=-1.6; scene.add(hp);
  })();

  // ---- drifting dust for depth parallax ----
  (function dust(){
    const N=420, pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      pos[i*3]  =(Math.random()-0.5)*16;
      pos[i*3+1]=(Math.random()-0.5)*10;
      pos[i*3+2]=(Math.random()-0.5)*8 - 1;
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const m=new THREE.PointsMaterial({color:0x9fb0c2, size:0.018, transparent:true, opacity:0.5, depthWrite:false, blending:THREE.AdditiveBlending});
    const pts=new THREE.Points(g,m); scene.add(pts); window.__dust=pts;
  })();

  // ---- interaction: auto-spin + drag with inertia ----
  let rotY=-0.5, velY=0, dragging=false, lastX=0, auto=0.0045, idle=0;
  const dom=renderer.domElement;
  function down(x){ dragging=true; lastX=x; idle=0; hideHint(); }
  function move(x){ if(!dragging) return; const dx=x-lastX; lastX=x; velY=dx*0.006; rotY+=dx*0.006; }
  function up(){ dragging=false; }
  dom.addEventListener('pointerdown', e=>down(e.clientX));
  addEventListener('pointermove', e=>move(e.clientX));
  addEventListener('pointerup', up);
  dom.addEventListener('touchstart', e=>down(e.touches[0].clientX), {passive:true});
  addEventListener('touchmove', e=>move(e.touches[0].clientX), {passive:true});
  addEventListener('touchend', up);

  const hintEl=document.getElementById('hint');
  setTimeout(()=>hintEl.classList.add('show'), 900);
  let hintHidden=false;
  function hideHint(){ if(!hintHidden){ hintHidden=true; hintEl.classList.remove('show'); } }
  setTimeout(hideHint, 6000);

  // ---- loop ----
  const clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const t=clock.getElapsedTime();
    if(!dragging){ rotY += auto + velY; velY*=0.94; }
    logo.rotation.y = rotY;
    logo.rotation.x = Math.sin(t*0.45)*0.11;          // gentle breathing tilt
    logo.position.y = Math.sin(t*0.6)*0.06;            // slow float
    goldRim.position.x = Math.cos(t*0.5)*4.4;          // gold sweep
    goldRim.position.z = Math.sin(t*0.5)*3.2 + 1.5;
    if(window.__dust) window.__dust.rotation.y = t*0.01;
    render();
  }
  function render(){ renderer.render(scene, camera); }
  animate();

  addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight); render();
  });
  </script>
</body>
</html>
